<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개발자 MBTI 캐릭터 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 시작 화면 -->
        <div id="start-screen" class="screen">
            <div class="main-graphic">💻✨</div>
            <h1>나의 개발자 MBTI & 캐릭터 찾기</h1>
            <p>5단계 정밀 질문을 통해 나의 개발 성향과<br>나를 대변하는 개발자 부캐(캐릭터)를 만나보세요!</p>
            <button id="start-btn">테스트 시작하기</button>
        </div>

        <!-- 질문 화면 -->
        <div id="question-screen" class="screen hidden">
            <div class="progress-container">
                <span id="progress-text">1 / 10</span>
                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                </div>
            </div>
            
            <h2 id="question-text">질문 텍스트가 들어가는 곳</h2>
            
            <!-- 5단계 라디오 버튼 선택지 -->
            <div class="likert-scale">
                <label class="likert-option opt-very-disagree">
                    <input type="radio" name="likert" value="-2">
                    <span class="custom-radio"></span>
                    <span class="label-text">매우 그렇지 않음</span>
                </label>
                <label class="likert-option opt-disagree">
                    <input type="radio" name="likert" value="-1">
                    <span class="custom-radio"></span>
                    <span class="label-text">그렇지 않음</span>
                </label>
                <label class="likert-option opt-neutral">
                    <input type="radio" name="likert" value="0">
                    <span class="custom-radio"></span>
                    <span class="label-text">보통</span>
                </label>
                <label class="likert-option opt-agree">
                    <input type="radio" name="likert" value="1">
                    <span class="custom-radio"></span>
                    <span class="label-text">그렇다</span>
                </label>
                <label class="likert-option opt-very-agree">
                    <input type="radio" name="likert" value="2">
                    <span class="custom-radio"></span>
                    <span class="label-text">매우 그렇다</span>
                </label>
            </div>

            <button id="next-btn" disabled>다음 질문</button>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="screen hidden">
            <h2>나의 개발자 부캐는?</h2>
            
            <!-- 캐릭터 카드 레이아웃 -->
            <div class="character-card">
                <div id="char-avatar" class="char-avatar">🧙‍♂️</div>
                <div id="char-title" class="char-title">타이틀</div>
                <div id="mbti-result" class="mbti-type">ESTJ</div>
            </div>

            <p id="result-desc">결과 설명이 들어가는 곳</p>
            <button id="restart-btn">다시 테스트하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
